name: Floric
options:
  bundleIdPrefix: co.sultans.floric
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ARCHS: "arm64 x86_64"
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
      CODE_SIGN_IDENTITY: "-"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      ONLY_ACTIVE_ARCH: NO
      # Override at xcodebuild time with -DCODE_SIGN_IDENTITY="Developer ID Application: ..."
      # or via CODE_SIGN_IDENTITY env var. Default "-" lets unsigned-dev Release builds
      # succeed locally; the packaging script (`scripts/build-release.sh`) re-signs.
      CODE_SIGN_IDENTITY: "-"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
targets:
  Floric:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Floric
        excludes:
          - "Info.plist"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.sultans.floric
        PRODUCT_NAME: Floric
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Floric/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Floric/Floric.entitlements
    scheme:
      testTargets:
        - FloricTests
      gatherCoverageData: true
  FloricTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FloricTests
    dependencies:
      - target: Floric
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.sultans.FloricTests
        PRODUCT_NAME: FloricTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Floric.app/Contents/MacOS/Floric"
